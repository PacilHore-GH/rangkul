version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rangkul_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/code
    environment:
      - APP_NAME=Rangkul Backend API
      - DEBUG=True
      - CORS_ORIGINS=["http://localhost:3000", "http://127.0.0.1:3000"]
    # We can override command for local live reload development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rangkul_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    stdin_open: true
    tty: true
