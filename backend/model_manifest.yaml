models:
  whisper:
    provider: huggingface
    repo_id: openai/whisper-large-v3-turbo
    revision: pinned-after-bootstrap
    local_dir: whisper-large-v3-turbo
  motionbert_lite:
    provider: huggingface
    repo_id: walterzhu/MotionBERT
    revision: pinned-after-bootstrap
    files:
      - checkpoint/pretrain/MB_lite/latest_epoch.bin
      - configs/pretrain/MB_lite.yaml
  mediapipe_face:
    provider: direct
    source: official_google_mediapipe
    url: https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task
    sha256: replace-with-verified-sha256-during-model-bootstrap
    local_path: mediapipe/face_landmarker.task
  mediapipe_pose_full:
    provider: direct
    source: official_google_mediapipe
    url: https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/latest/pose_landmarker_full.task
    sha256: replace-with-verified-sha256-during-model-bootstrap
    local_path: mediapipe/pose_landmarker_full.task
