name: Frontend Preview

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read

jobs:
  detect-frontend-change:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changed.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - id: changed
        run: |
          git fetch origin main --depth=1
          if git diff --name-only FETCH_HEAD...HEAD | grep -q '^frontend/'; then
            echo 'changed=true' >> "$GITHUB_OUTPUT"
          else
            echo 'changed=false' >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: detect-frontend-change
    if: needs.detect-frontend-change.outputs.changed == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: vercel-preview-${{ github.event.workflow_run.pull_requests[0].number }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - run: npx vercel@latest pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"
      - run: npx vercel@latest build --token="${{ secrets.VERCEL_TOKEN }}"
      - run: npx vercel@latest deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}"
