name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  application:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      - run: bun run build

  migration-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject secrets and destructive migration primitives
        shell: bash
        run: |
          ! grep -RIE '(SUPABASE_SERVICE_ROLE_KEY|GROQ_API_KEY)=[^[:space:]]+' --exclude='.env.example' .
          ! grep -RIE 'DROP[[:space:]]+(TABLE|SCHEMA|DATABASE)' supabase/migrations
